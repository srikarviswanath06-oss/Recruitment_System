<!DOCTYPE html>
<html>
<head>
    <title>Recruitment SaaS - Login</title>
    <style>
        body {
            background: linear-gradient(135deg,#0f172a,#1e293b);
            font-family: Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .login-box {
            background:#0b1220;
            padding:40px;
            border-radius:16px;
            width:350px;
            box-shadow:0 10px 30px rgba(0,0,0,0.6);
            color:white;
        }

        input {
            width:100%;
            padding:12px;
            margin-top:15px;
            border-radius:8px;
            border:none;
            background:#1e293b;
            color:white;
        }

        button {
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:8px;
            background:#4f46e5;
            color:white;
            cursor:pointer;
        }

        button:hover {
            background:#4338ca;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Recruitment SaaS</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>

    function login() {

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        fetch("http://localhost:8080/users/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        })
            .then(async res => {

                if (!res.ok) {
                    const text = await res.text();
                    alert(text);
                    return;
                }

                return res.json();
            })
            .then(data => {

                if (!data) return;

                localStorage.setItem("userId", data.userId);
                localStorage.setItem("name", data.name);
                localStorage.setItem("role", data.role);

                if (data.role === "ADMIN") {
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "candidate.html";
                }
            })
            .catch(err => {
                alert("Server error");
            });
    }

</script>

</body>
</html>
