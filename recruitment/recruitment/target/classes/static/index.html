<!DOCTYPE html>
<html>
<head>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <title>Recruitment System</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            padding: 30px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

        button {
            padding: 6px 12px;
            border: none;
            cursor: pointer;
            color: white;
            border-radius: 4px;
        }

        .approve {
            background-color: green;
        }

        .reject {
            background-color: red;
        }
    </style>
</head>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<nav class="navbar navbar-dark bg-dark shadow px-4">
    <a class="navbar-brand fw-bold" href="#">
        <i class="bi bi-file-earmark-person-fill text-info me-2 fs-4"></i>
        Smart Recruitment Portal
    </a>
</nav>

<body>

<h1>All Applications</h1>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Job Title</th>
        <th>User Name</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="applicationTable">
    </tbody>
</table>

<script>

    function loadApplications() {
        fetch("http://localhost:8080/applications")
            .then(response => response.json())
            .then(data => {

                let table = document.getElementById("applicationTable");
                table.innerHTML = "";

                data.forEach(app => {

                    let row = `
                    <tr>
                        <td>${app.id}</td>
                        <td>${app.jobTitle}</td>
                        <td>${app.userName}</td>
                        <td>${app.status}</td>
                        <td>
                            <button class="approve" onclick="approve(${app.id})">Approve</button>
                            <button class="reject" onclick="reject(${app.id})">Reject</button>
                        </td>
                    </tr>
                `;

                    table.innerHTML += row;
                });
            });
    }

    function approve(id) {
        fetch(`http://localhost:8080/applications/${id}/approve`, {
            method: "PUT"
        }).then(() => loadApplications());
    }

    function reject(id) {
        fetch(`http://localhost:8080/applications/${id}/reject`, {
            method: "PUT"
        }).then(() => loadApplications());
    }

    window.onload = loadApplications;

</script>

</body>
</html>
